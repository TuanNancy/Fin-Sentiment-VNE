<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinSentiment - Phân tích cảm xúc tài chính</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #38bdf8;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 1rem;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #38bdf8;
    }

    textarea::placeholder {
      color: #475569;
    }

    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #334155;
      cursor: not-allowed;
    }

    .result {
      margin-top: 1.5rem;
      padding: 1.5rem;
      border-radius: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      display: none;
    }

    .result.show {
      display: block;
    }

    .sentiment-label {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1rem;
    }

    .sentiment-label.positive {
      color: #4ade80;
    }

    .sentiment-label.negative {
      color: #f87171;
    }

    .sentiment-label.neutral {
      color: #94a3b8;
    }

    .score-row {
      display: flex;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .score-label {
      width: 80px;
      font-size: 0.85rem;
      text-transform: uppercase;
      font-weight: 600;
    }

    .score-bar-bg {
      flex: 1;
      height: 10px;
      background: #334155;
      border-radius: 5px;
      overflow: hidden;
      margin: 0 0.75rem;
    }

    .score-bar {
      height: 100%;
      border-radius: 5px;
      transition: width 0.4s ease;
    }

    .score-value {
      width: 50px;
      text-align: right;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .error {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 12px;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FinSentiment</h1>
    <p class="subtitle">Phân tích cảm xúc tiếng Việt</p>

    <textarea id="inputText" placeholder="Nhập văn bản cần phân tích cảm xúc..."></textarea>
    <button id="btnAnalyze" onclick="analyze()">Phân tích</button>

    <div class="error" id="errorBox"></div>

    <div class="result" id="resultBox">
      <div class="sentiment-label" id="sentimentLabel"></div>
      <div id="scoresContainer"></div>
    </div>
  </div>

  <script>
    const COLORS = { positive: '#4ade80', negative: '#f87171', neutral: '#94a3b8' };
    const LABELS = { positive: 'Tích cực', negative: 'Tiêu cực', neutral: 'Trung lập' };

    async function analyze() {
      const text = document.getElementById('inputText').value.trim();
      const btn = document.getElementById('btnAnalyze');
      const resultBox = document.getElementById('resultBox');
      const errorBox = document.getElementById('errorBox');

      if (!text) return;

      btn.disabled = true;
      btn.textContent = 'Đang phân tích...';
      resultBox.classList.remove('show');
      errorBox.classList.remove('show');

      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        if (!res.ok) throw new Error('Lỗi server: ' + res.status);
        const data = await res.json();

        const label = data.sentiment;
        document.getElementById('sentimentLabel').textContent = LABELS[label] || label;
        document.getElementById('sentimentLabel').className = 'sentiment-label ' + label;

        const scores = data.scores;
        const maxScore = Math.max(...Object.values(scores));
        const container = document.getElementById('scoresContainer');
        container.innerHTML = '';

        for (const [cls, val] of Object.entries(scores)) {
          const pct = Math.max(0, val / maxScore) * 100;
          container.innerHTML += `
            <div class="score-row">
              <span class="score-label" style="color:${COLORS[cls]}">${LABELS[cls] || cls}</span>
              <div class="score-bar-bg">
                <div class="score-bar" style="width:${pct}%;background:${COLORS[cls]}"></div>
              </div>
              <span class="score-value">${(val * 100).toFixed(1)}%</span>
            </div>`;
        }

        resultBox.classList.add('show');
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Phân tích';
      }
    }

    document.getElementById('inputText').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.ctrlKey) analyze();
    });
  </script>
</body>

</html>
